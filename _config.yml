#网站
title: LiGaoGreat
subtitle: ''
description: ''
keywords:
author: LiGaoGreat
language: zh-CN
timezone: 'Asia/Shanghai'

#网址
url: https://haqinb.github.io/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: fals
  trailing_html: true
  
#目录
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

#文章
new_post_name: :title.md
default_layout: 新文章
titlecase: false
external_link:
  enable: true 
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

#
index_generator:
  path: ''
  per_page: 10
  order_by: -date

#分类 & 标签
default_category: uncategorized
category_map:
tag_map:

#
meta_generator: true

#日期 / 时间格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

#分页
per_page: 10
pagination_dir: page

#包括或不包括目录和文件
include:
exclude:
ignore:

#扩展
theme: 'butterfly'
deploy:
  type: git
  repo: https://github.com/HaQiNB/HaQiNB.github.io.git
  branch: master
  message: message
  extend_dirs: /
  ignore_pattern: /node_modules